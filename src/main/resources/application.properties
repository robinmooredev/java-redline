# Application settings
spring.application.name=Redline Document Service

# Logging configuration
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %highlight(%-5level) %logger{36} - %msg%n

# File upload settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Server settings
server.error.include-message=always
server.error.include-binding-errors=always

# Redline service configuration
redline.document.reviewer-name=AI Reviewer
redline.document.reviewer-initials=AI

# File naming configuration
redline.file.original-file-prefix=original-
redline.file.redline-file-prefix=redline-
redline.file.clean-file-prefix=clean-
redline.file.pdf-file-prefix=redline-
redline.file.zip-file-prefix=redline-output-

redline.file.redline-filename=redline.docx
redline.file.clean-filename=clean.docx
redline.file.pdf-filename=redline.pdf
redline.file.zip-filename=redline-output.zip

# Paragraph matching configuration
redline.paragraph-matching.levenshtein-threshold=0.85
redline.paragraph-matching.embedding-threshold=0.92
redline.paragraph-matching.use-embedding-search=false